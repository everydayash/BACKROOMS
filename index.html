<!DOCTYPE html>
<html>
<head>
  <title>Backrooms Entities</title>

  <style>
    body {
      margin: 0;
      background: #4b4208;
      color: white;
      font-family: Arial, sans-serif;
    }

    .page {
      padding: 30px;
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    h2 {
      font-size: 36px;
      font-weight: normal;
      margin-top: 20px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      margin-top: 40px;
    }

    .card {
      width: 160px;
      height: 180px;
      background: #222;
      position: relative;
      overflow: hidden;
      border: 2px solid #111;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card p {
      position: absolute;
      bottom: 5px;
      left: 8px;
      margin: 0;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 4px black;
    }

    .arrow {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: dodgerblue;
      color: white;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      text-align: center;
      line-height: 25px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>Backrooms Entities</h1>
    <h2>Guide</h2>

    <div class="cards">

      <div class="card">
        <img src="captain.jpg">
        <p>CAPTAIN CLARK</p>
        <div class="arrow">➜</div>
      </div>

      <div class="card">
        <img src="still-lifes.jpg">
        <p>STILL-LIFES</p>
        <div class="arrow">➜</div>
      </div>

      <div class="card">
        <img src="lifeform.jpg">
        <p>THE LIFEFORM</p>
        <div class="arrow">➜</div>
      </div>

      <div class="card">
        <img src="smiler.jpg">
        <p>SMILERS</p>
        <div class="arrow">➜</div>
      </div>

      <div class="card">
        <img src="growth.jpg">
        <p>THE GROWTH</p>
        <div class="arrow">➜</div>
      </div>

      <div class="card">
        <img src="green-glow.jpg">
        <p>THE GREEN GLOW</p>
        <div class="arrow">➜</div>
      </div>

    </div>
  </div>
</body>
</html>
